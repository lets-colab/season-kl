name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # No marketplace actions: the org Actions policy requires allowlisted,
      # SHA-pinned actions, so we publish with plain git + the built-in token.
      - name: Publish main to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" site
          cd site
          rm -rf .github .agents skills-lock.json .mcp.json
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push origin gh-pages --force

      # GITHUB_TOKEN pushes don't trigger the internal Pages build here
      # (confirmed 2026-07-04), so an explicit build request is the critical
      # path — fail loudly if it doesn't go through.
      - name: Request Pages build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
