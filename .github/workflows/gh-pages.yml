name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Detect whether GitHub Pages is currently configured to build from a
  # branch ("legacy") or via GitHub Actions ("workflow"), so we don't
  # attempt a deployment path that's blocked by environment protection
  # rules for the branch this workflow runs on.
  detect-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.check.outputs.mode }}
    steps:
      - name: Check Pages build type
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mode=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('build_type','unknown'))" \
            || echo unknown)
          echo "Pages build_type: ${mode}"
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"

  # Path A — keep the gh-pages branch current (serves Pages when the source
  # is "Deploy from a branch"). Plain git, no actions: immune to the
  # Actions allowlist.
  publish-branch:
    needs: detect-mode
    runs-on: ubuntu-latest
    steps:
      - name: Publish main to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" site
          cd site
          rm -rf .github .agents skills-lock.json .mcp.json
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push origin gh-pages --force
      # In branch mode this request IS the publish step, so it must fail loudly;
      # in Actions mode the deploy-pages job publishes and this is a no-op.
      - name: Request legacy Pages build (branch mode only)
        if: needs.detect-mode.outputs.mode == 'legacy'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -f -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"

  # Path B — official Pages deployment (serves Pages when the source is
  # "GitHub Actions"). Only runs when Pages is actually in "workflow" mode,
  # since the github-pages environment's deployment branch policy currently
  # only allows the gh-pages branch and would otherwise reject this job.
  deploy-pages:
    needs: detect-mode
    if: needs.detect-mode.outputs.mode == 'workflow'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Strip internal files
        run: |
          rm -rf .github .agents skills-lock.json .mcp.json
          touch .nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
