<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — Season KL</title>
<link rel="icon" href="season-logo.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=Outfit:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020008;--accent:#C9A05A;--text:#F0F4FA;--muted:rgba(240,244,250,0.45);
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;font-weight:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100svh;text-align:center;padding:40px 24px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(201,160,90,.008) 0,transparent 1px,transparent 4px);
}
.logo{height:32px;width:auto;margin-bottom:40px;filter:brightness(1.05)}
.code{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.25em;
  text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:24px;
}
h1{
  font-family:'Bodoni Moda',serif;font-size:clamp(2.5rem,8vw,5rem);
  font-weight:400;line-height:1.1;margin-bottom:20px;letter-spacing:-.02em;
}
p{
  font-size:.95rem;color:var(--muted);line-height:1.7;
  max-width:340px;margin:0 auto 36px;
}
a{
  display:inline-block;
  font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--text);text-decoration:none;
  border:1px solid rgba(201,160,90,.3);padding:14px 32px;
  transition:border-color .2s,color .2s;
}
a:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
  <img src="season-logo.png" alt="Season KL" class="logo" onerror="this.style.display='none'">
  <p class="code">404 — Not Found</p>
  <h1>Wrong<br>Chapter.</h1>
  <p>This page doesn't exist. The right crowd is one click away.</p>
  <a href="index.html">← Back to Season KL</a>
</body>
</html>
